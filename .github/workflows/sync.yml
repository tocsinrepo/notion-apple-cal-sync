name: Notion <-> Apple Calendar Sync

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 minutes
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # needed to commit the updated sync_state.json

concurrency:
  group: cal-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          # Secrets (Settings -> Secrets and variables -> Actions -> Secrets)
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          # Variables (same page -> Variables tab). All optional.
          NOTION_TITLE_PROP: ${{ vars.NOTION_TITLE_PROP }}
          NOTION_DATE_PROP: ${{ vars.NOTION_DATE_PROP }}
          APPLE_CALENDAR_NAME: ${{ vars.APPLE_CALENDAR_NAME }}
          APPLE_TZ: ${{ vars.APPLE_TZ }}
          WINDOW_PAST_DAYS: ${{ vars.WINDOW_PAST_DAYS }}
          WINDOW_FUTURE_DAYS: ${{ vars.WINDOW_FUTURE_DAYS }}
          ALLOW_DELETES: ${{ vars.ALLOW_DELETES }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: python sync.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain sync_state.json)" ]]; then
            git config user.name "cal-sync-bot"
            git config user.email "actions@users.noreply.github.com"
            git add sync_state.json
            git commit -m "chore: update sync state [skip ci]"
            git push
          else
            echo "No state change."
          fi
